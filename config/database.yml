default: &default
  adapter: postgresql
  encoding: unicode
  host: localhost
  username: kevin    
  password:
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: proj_development

test:
  <<: *default
  database: proj_test

production:
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>
  sslmode: require
  connect_timeout: 5

  variables:
    statement_timeout: 5000
