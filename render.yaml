# Render Blueprint - deploy from dashboard: New > Blueprint
# No database needed for this skeleton app.
services:
  - type: web
    name: proj
    runtime: ruby
    plan: free

    buildCommand: "./bin/render-build.sh"
    # No paid "release command" needed: migrate runs when the dyno boots (adds a few seconds per restart).
    startCommand: "DISABLE_DATABASE_ENVIRONMENT_CHECK=1 bin/rails db:reset && bin/rails server -p $PORT -e production"

    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"
