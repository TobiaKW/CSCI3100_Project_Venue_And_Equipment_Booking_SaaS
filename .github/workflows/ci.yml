name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Verify Ruby 3.3.10 and Rails 7.2.3
        run: |
          [ "$(ruby -e 'puts RUBY_VERSION')" = "3.3.10" ] || (echo "Expected Ruby 3.3.10, got $(ruby -e 'puts RUBY_VERSION')"; exit 1)
          [ "$(bundle exec rails -v)" = "Rails 7.2.3" ] || (echo "Expected Rails 7.2.3, got $(bundle exec rails -v)"; exit 1)

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

